<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Clahe Eventos · Editor de Invitaciones</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0a07;--panel:#15110a;--panel2:#1d1810;--gold:#cdad24;--gold-soft:#ecd98a;--cream:#efe7d4;--muted:#9a895f;--hair:rgba(205,173,36,.28);--ok:#3a7d44;--ease:cubic-bezier(.22,.61,.25,1)}
*{box-sizing:border-box}
body{margin:0;font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--cream);font-size:14px}
.app{display:grid;grid-template-columns:minmax(360px,460px) 1fr;height:100vh}
@media(max-width:880px){.app{grid-template-columns:1fr;height:auto}}
/* ── panel form ── */
.panel{background:var(--panel);border-right:1px solid var(--hair);overflow-y:auto;height:100vh}
@media(max-width:880px){.panel{height:auto}}
.head{position:sticky;top:0;z-index:5;background:linear-gradient(180deg,#15110a,#15110aee);backdrop-filter:blur(6px);border-bottom:1px solid var(--hair);padding:16px 20px}
.head h1{font-family:'Libre Baskerville',serif;font-style:italic;font-size:20px;margin:0;color:var(--gold-soft)}
.head .sub{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-top:3px}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.btn{font-family:'Montserrat';font-weight:600;font-size:11px;letter-spacing:1px;text-transform:uppercase;border:1px solid var(--gold);
  background:transparent;color:var(--gold-soft);padding:9px 13px;border-radius:7px;cursor:pointer;transition:.25s var(--ease)}
.btn:hover{background:var(--gold);color:#1a1405}
.btn.primary{background:var(--gold);color:#1a1405}
.btn.primary:hover{filter:brightness(1.1)}
.btn.sm{padding:6px 9px;font-size:10px}
.form{padding:8px 20px 60px}
.group{border:1px solid var(--hair);border-radius:10px;margin:14px 0;overflow:hidden;background:var(--panel2)}
.group>summary{cursor:pointer;list-style:none;padding:13px 16px;font-family:'Montserrat';font-weight:600;font-size:12px;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--gold-soft);display:flex;justify-content:space-between;align-items:center}
.group>summary::after{content:"+";color:var(--gold);font-size:16px}
.group[open]>summary::after{content:"–"}
.group>summary::-webkit-details-marker{display:none}
.gbody{padding:6px 16px 16px}
.field{margin:11px 0}
.field label{display:block;font-size:10.5px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.field input[type=text],.field input[type=date],.field input[type=time],.field input[type=number],.field input[type=url],.field textarea,.field select{
  width:100%;background:#0d0b07;border:1px solid var(--hair);border-radius:7px;color:var(--cream);
  font-family:'Montserrat';font-size:13px;padding:9px 11px;outline:none;transition:.2s}
.field input:focus,.field textarea:focus{border-color:var(--gold)}
.field textarea{min-height:66px;resize:vertical;line-height:1.5}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.chk{display:flex;align-items:center;gap:9px;padding:7px 0;font-size:12.5px;color:var(--cream)}
.chk input{width:17px;height:17px;accent-color:var(--gold)}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chips .chk{width:calc(50% - 5px);margin:0;text-transform:none;letter-spacing:0}
/* itinerario */
.itrow{display:grid;grid-template-columns:84px 1fr 34px;gap:8px;margin:8px 0;align-items:center}
.itrow input{margin:0}
.del{border:1px solid var(--hair);background:transparent;color:#c98;border-radius:7px;height:36px;cursor:pointer;font-size:16px}
.del:hover{background:#3a1414;color:#fdd}
.hint{font-size:11px;color:var(--muted);line-height:1.5;margin:4px 0 0}
.hint b{color:var(--gold-soft)}
/* preview */
.preview{position:relative;background:#000;height:100vh}
@media(max-width:880px){.preview{height:78vh}}
.pvbar{position:absolute;top:0;left:0;right:0;height:42px;background:#0c0a07;border-bottom:1px solid var(--hair);display:flex;align-items:center;justify-content:space-between;padding:0 14px;z-index:3}
.pvbar .t{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.devices{display:flex;gap:6px}
.dev{border:1px solid var(--hair);background:transparent;color:var(--gold-soft);border-radius:6px;padding:5px 10px;font-size:10px;cursor:pointer;text-transform:uppercase;letter-spacing:1px}
.dev.on{background:var(--gold);color:#1a1405}
.frameWrap{position:absolute;top:42px;left:0;right:0;bottom:0;display:flex;justify-content:center;align-items:flex-start;overflow:auto;padding:18px}
#pv{border:0;background:#000;width:100%;height:100%;border-radius:6px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
#pv.phone{width:390px;height:96%;flex:0 0 auto;border:1px solid var(--hair)}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--gold);color:#1a1405;
  padding:11px 20px;border-radius:8px;font-weight:600;font-size:13px;opacity:0;pointer-events:none;transition:.35s var(--ease);z-index:50}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">
  <div class="panel">
    <div class="head">
      <h1>Editor de Invitaciones</h1>
      <div class="sub">Clahe Eventos · Panel</div>
      <div class="actions">
        <button class="btn primary" id="download">⬇ Descargar invitación</button>
        <button class="btn" id="saveJson">Guardar datos</button>
        <button class="btn" id="loadJson">Cargar datos</button>
        <button class="btn" id="reset">Reiniciar</button>
        <input type="file" id="fileJson" accept="application/json" hidden>
      </div>
    </div>
    <div class="form" id="form"></div>
  </div>
  <div class="preview">
    <div class="pvbar">
      <span class="t">Vista previa en vivo</span>
      <div class="devices">
        <button class="dev on" data-d="desktop">Escritorio</button>
        <button class="dev" data-d="phone">Celular</button>
        <button class="dev" id="openTab">Abrir ↗</button>
      </div>
    </div>
    <div class="frameWrap"><iframe id="pv"></iframe></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ════════ Plantilla real de Clahe (inyectada) ════════ */
const TEMPLATE = "<!DOCTYPE html>\n<html lang=\"es\">\n<head>\n<meta charset=\"UTF-8\" />\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1, viewport-fit=cover\" />\n<title>Invitaci\u00f3n \u00b7 Clahe Eventos</title>\n<meta name=\"theme-color\" content=\"#070604\" />\n<meta property=\"og:type\" content=\"website\" />\n<meta property=\"og:title\" content=\"Invitaci\u00f3n \u00b7 Clahe Eventos\" />\n<meta property=\"og:description\" content=\"Un recuerdo para toda la vida.\" />\n<link rel=\"icon\" href=\"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='25' font-size='24'%3E%E2%9C%A6%3C/text%3E%3C/svg%3E\">\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n<link href=\"https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;500;600&display=swap\" rel=\"stylesheet\">\n<style>\n/* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n   CLAHE EVENTOS \u2014 PLANTILLA DE INVITACION DIGITAL\n   Para personalizar cada evento, edita SOLO el bloque CONFIG (al final del\n   archivo). No hace falta tocar el resto del codigo.\n   \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u :100%;height:100%}\n.frame .a{display:none}.frame .b{top:-1px;right:-1px;transform:scaleX(-1)}\n.frame .c{bottom:-1px;left:-1px;transform:scaleY(-1)}.frame .d{display:none}\n\n#topmark{position:fixed;top:22px;left:50%;transform:translateX(-50%) translateY(-12px);z-index:125;text-align:center;\n  opacity:0;transition:opacity 1s var(--ease),transform 1s var(--ease);pointer-events:auto}\n#topmark.show{opacity:.96;transform:translateX(-50%) translateY(0)}\n#topmark .s{font-family:'Libre Baskerville',serif;font-style:italic;font-size:24px;line-height:.9}\n#topmark .e{font-family:'Montserrat',sans-serif;letter-spacing:5px;font-size:7px;text-transform:uppercase;color:var(--muted);margin-top:1px}\n\n.lockup{display:inline-flex;flex-direction:column;align-items:center;line-height:1}\n.lockup .s{font-family:'Libre Baskerville',serif;font-style:italic;background:var(--champ);-webkit-background-clip:text;background-clip:text;color:transparent;\n  filter:drop-shadow(0 2px 12px rgba(205,173,36,.25))}\n.lockup .e{font-family:'Montserrat',sans-serif;text-transform:uppercase;color:var(--gold-soft);display:flex;align-items:center;gap:.6em}\n.lockup .e::before,.lockup .e::after{content:\"\";height:1px;width:1.6em;background:var(--gold)}\n\n#intro{position:fixed;inset:0;z-index:200;background:radial-gradient(circle at 50% 42%,#15100a,#040302 72%);\n  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity 1.2s var(--ease),visibility 1.2s}\n#intro.hide{opacity:0;visibility:hidden}\n#intro .lockup .s{font-size:50px}#intro .lockup .e{font-size:10px;letter-spacing:6px;margin-top:2px}\n.intro-presents{font-family:'Montserrat',sans-serif;letter-spacing:5px;font-size:10px;text-transform:uppercase;color:var(--muted);opacity:0;animation:fu 1s 1.1s forwards}\n.mono{width:118px;height:118px;position:relative;display:grid;place-items:center;margin-top:6px}\n.mono svg{position:absolute;inset:0}\n.mono .ring{fill:none;stroke:url(#g);stroke-width:1;stroke-dasharray:357;stroke-dashoffset:357;animation:draw 2.4s var(--ease) forwards}\n@keyframes draw{to{stroke-dashoffset:0}}\n.mono b{font-family:'Libre Baskerville',serif;font-style:italic;font-size:54px;line-height:1;background:var(--champ);-webkit-background-clip:text;background-clip:text;color:transparent;\n  opacity:0;transform:scale(.7);animation:pop 1.2s .6s var(--ease) forwards}\n@keyframes pop{to{opacity:1;transform:scale(1)}}\n.intro-cap{font-family:'Montserrat',sans-serif;letter-spacing:5px;font-size:11px;color:var(--muted);text-transform:uppercase;opacity:0;animation:fu 1s 1.6s forwards}\n@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}\n\nmain{position:relative;z-index:1}\nsection{max-width:var(--maxw);margin:0 auto;padding:clamp(58px,10.5vw,116px) 30px;text-align:center;position:relative}\n.eyebrow{font-family:'Montserrat',sans-serif;text-transform:uppercase;letter-spacing:5px;font-size:11px;color:var(--gold);margin:0 0 22px;opacity:.92}\n.script{font-family:'Libre Baskerville',serif;font-style:italic;line-height:1.12;background:var(--champ);-webkit-background-clip:text;background-clip:text;color:transparent;\n  filter:drop-shadow(0 2px 14px rgba(205,173,36,.22))}\n.serif{font-family:'Libre Baskerville',serif}\n.gold{background:var(--champ);-webkit-background-clip:text;background-clip:text;color:transparent}\n.lead{font-family:'Libre Baskerville',serif;font-style:italic;color:#e3d8bd;font-weight:300;font-size:clamp(18px,2.3vw,22px);max-width:37ch;margin:18px auto 0}\n.fine{font-family:'Montserrat',sans-serif;letter-spacing:3px;text-transform:uppercase;font-size:11px;color:var(--muted)}\n.shimmer{position:relative}\n.shimmer::after{content:\"\";position:absolute;inset:0;background:linear-gradient(110deg,transparent 42%,rgba(255,255,255,.7) 50%,transparent 58%);\n  -webkit-background-clip:text;background-clip:text;color:transparent;mix-blend-mode:screen;background-size:260% 100%;animation:shine 8s 2s linear infinite}\n *DPR;H=cv.height=innerHeight*DPR;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';\n  const n=Math.min(70,Math.floor(innerWidth*innerHeight/22000));ps=Array.from({length:n},mk);}\nfunction mk(){return{x:Math.random()*W,y:Math.random()*H,r:(Math.random()*1.3+.25)*DPR,vy:(Math.random()*.16+.03)*DPR,vx:(Math.random()-.5)*.1*DPR,a:Math.random()*6.28,tw:Math.random()*.03+.008,b:Math.random()*.45+.2};}\nfunction fr(){cx.clearRect(0,0,W,H);for(const p of ps){p.a+=p.tw;p.y-=p.vy;p.x+=p.vx;if(p.y<-8){p.y=H+8;p.x=Math.random()*W;}if(p.x<-8)p.x=W+8;if(p.x>W+8)p.x=-8;\n  const t=p.b+Math.sin(p.a)*.3;cx.beginPath();cx.arc(p.x,p.y,p.r,0,6.283);cx.fillStyle='rgba(205,173,60,'+Math.max(0,t)+')';cx.shadowColor='rgba(205,173,60,.7)';cx.shadowBlur=7*DPR;cx.fill();}\n  if(!reduce)requestAnimationFrame(fr);}\nrs();addEventListener('resize',rs);reduce?fr():requestAnimationFrame(fr);\n\nconst hn=$('heroName');addEventListener('scroll',()=>{const y=scrollY;if(y<innerHeight)hn.style.transform='translateY('+y*0.08+'px)';},{passive:true});\n\naddEventListener('load',()=>setTimeout(()=>$('intro').classList.add('hide'),2900));\nsetTimeout(()=>$('intro').classList.add('hide'),3900);\nconst mu=$('music'),au=$('audio');\nif(CONFIG.musicUrl){au.src=CONFIG.musicUrl;mu.style.display='flex';\n  mu.onclick=()=>{if(au.paused){au.play();mu.classList.add('on');}else{au.pause();mu.classList.remove('on');}};}\n<\/script>\n</body>\n</html>\n";

let state = structuredClone(DEFAULTS);
try{ const saved=localStorage.getItem('clahe-inv'); if(saved) state=Object.assign(structuredClone(DEFAULTS), JSON.parse(saved)); }catch(e){}

/* helpers path */
const get=(o,p)=>p.split('.').reduce((a,k)=>a&&a[k],o);
const set=(o,p,v)=>{const ks=p.split('.');let a=o;for(let i=0;i<ks.length-1;i++)a=a[ks[i]];a[ks[ks.length-1]]=v;};

 ["Evento",[

const SHOW_LABELS={countdown:"Cuenta regresiva",fecha:"Fecha",itinerario:"Cronograma",lugar:"Lugar",rsvp:"Confirmación",dress:"Dress code",diet:"Menú",song:"Canción",gift:"Regalo",hashtag:"Hashtag",topMark:"Marca arriba (centro)"};

/* ── render del formulario ── */
const formEl=document.getElementById('form');
function buildForm(){
  formEl.innerHTML='';
  SCHEMA.forEach((grp,gi)=>{
    const d=document.createElement('details');d.className='group';if(gi<3)d.open=true;
    const sm=document.createElement('summary');sm.textContent=grp[0];d.appendChild(sm);
    const body=document.createElement('div');body.className='gbody';
    grp[1].forEach(fld=>body.appendChild(renderField(fld)));
    d.appendChild(body);formEl.appendChild(d);
  });
}
function renderField([path,label,type]){
  const wrap=document.createElement('div');
  if(type==='itinerary')return renderItinerary();
  if(type==='show')return renderShow();
  wrap.className='field';
  if(path==='__date'||path==='__start'){
    wrap.innerHTML='<label>'+label+'</label>';
    const inp=document.createElement('input');inp.type=(path==='__date'?'date':'time');
    if(path==='__date'){const z=n=>String(n).padStart(2,'0');inp.value=state.date.y+'-'+z(state.date.mo)+'-'+z(state.date.d);}
    else inp.value=String(state.date.h).padStart(2,'0')+':'+String(state.date.mi).padStart(2,'0');
    inp.oninput=()=>{ if(path==='__date'){const[y,m,da]=inp.value.split('-').map(Number);if(y){state.date.y=y;state.date.mo=m;state.date.d=da;state.date.dayNum=String(da);state.date.month=MESES[m-1];state.date.year=String(y);state.date.dayName=DIAS[new Date(y,m-1,da).getDay()];refreshDateText();}}
      else{const[h,mi]=inp.value.split(':').map(Number);state.date.h=h;state.date.mi=mi;} schedule(); };
    wrap.appendChild(inp);return wrap;
  }
  wrap.innerHTML='<label>'+label+'</label>';
  const el=type==='textarea'?document.createElement('textarea'):document.createElement('input');
  if(type!=='textarea')el.type=(type==='number'?'number':type==='url'?'url':'text');
  el.value=get(state,path)??'';
  el.dataset.path=path;
  el.oninput=()=>{ set(state,path, type==='number'?Number(el.value):el.value); schedule(); };
  wrap.appendChild(el);return wrap;
}
function refreshDateText(){ // refresca los campos de texto de fecha si están en el DOM
  const t=formEl.querySelector('[data-path="date.time"]'); // no autollenamos time (es libre)
}
/* cronograma dinámico */
function renderItinerary(){
  const wrap=document.createElement('div');
  const list=document.createElement('div');list.id='itlist';
  function row(it,idx){
    const r=document.createElement('div');r.className='itrow';
    const t=document.createElement('input');t.type='text';t.value=it.time;t.placeholder='22:00';
    const l=document.createElement('input');l.type='text';l.value=it.label;l.placeholder='Recepción';
    const b=document.createElement('button');b.className='del';b.textContent='×';
    t.oninput=()=>{state.itinerary[idx].time=t.value;schedule();};
    l.oninput=()=>{state.itinerary[idx].label=l.value;schedule();};
    b.onclick=()=>{state.itinerary.splice(idx,1);drawIt();schedule();};
    r.append(t,l,b);return r;
  }
  function drawIt(){list.innerHTML='';state.itinerary.forEach((it,i)=>list.appendChild(row(it,i)));}
  window.__drawIt=drawIt;
  const add=document.createElement('button');add.className='btn sm';add.textContent='+ Agregar momento';
  add.onclick=()=>{state.itinerary.push({time:'',label:''});drawIt();schedule();};
  wrap.appendChild(list);wrap.appendChild(add);drawIt();
  const h=document.createElement('p');h.className='hint';h.innerHTML='Dejá la lista vacía para ocultar el cronograma.';
  wrap.appendChild(h);return wrap;
}
/* secciones */
function renderShow(){
  const wrap=document.createElement('div');const chips=document.createElement('div');chips.className='chips';
  Object.keys(SHOW_LABELS).forEach(k=>{
    const lab=document.createElement('label');lab.className='chk';
    const c=document.createElement('input');c.type='checkbox';c.checked=!!state.show[k];
    c.onchange=()=>{state.show[k]=c.checked;schedule();};
    lab.appendChild(c);lab.appendChild(document.createTextNode(SHOW_LABELS[k]));chips.appendChild(lab);
  });
  wrap.appendChild(chips);return wrap;
}

/* ── construir HTML final ── */
function buildHTML(preview){
  const i=TEMPLATE.indexOf('const CONFIG');
  const j=TEMPLATE.indexOf('\n};', i)+3;
  let html=TEMPLATE.slice(0,i)+'const CONFIG = '+JSON.stringify(state,null,2)+';'+TEMPLATE.slice(j);
  if(preview)html=html.replace('</head>','<style>#intro{display:none!important}</style></head>');
  return html;
}

/* ── preview en vivo (debounce) ── */
const pv=document.getElementById('pv');let tmr;
function schedule(){clearTimeout(tmr);tmr=setTimeout(render,350);try{localStorage.setItem('clahe-inv',JSON.stringify(state));}catch(e){}}
function render(){pv.srcdoc=buildHTML(true);}

/* ── acciones ── */
function dl(name,content,type){const b=new Blob([content],{type});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(u),1500);}
function slug(s){return (s||'invitacion').toString().normalize('NFD').replace(/[^\w]+/g,'-').replace(/^-|-$/g,'').toLowerCase();}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

document.getElementById('download').onclick=()=>{dl('invitacion-'+slug(state.celebrant)+'.html',buildHTML(false),'text/html');toast('Invitación descargada ✓');};
document.getElementById('saveJson').onclick=()=>{dl('datos-'+slug(state.celebrant)+'.json',JSON.stringify(state,null,2),'application/json');toast('Datos guardados ✓');};
document.getElementById('loadJson').onclick=()=>document.getElementById('fileJson').click();
document.getElementById('fileJson').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{state=Object.assign(structuredClone(DEFAULTS),JSON.parse(r.result));buildForm();render();toast('Datos cargados ✓');}catch(x){toast('Archivo inválido');}};r.readAsText(f);};
document.getElementById('reset').onclick=()=>{if(confirm('¿Reiniciar con los valores de ejemplo?')){state=structuredClone(DEFAULTS);try{localStorage.removeItem('clahe-inv');}catch(e){}buildForm();render();toast('Reiniciado');}};
document.getElementById('openTab').onclick=()=>{const w=window.open();w.document.open();w.document.write(buildHTML(false));w.document.close();};
document.querySelectorAll('.dev[data-d]').forEach(b=>b.onclick=()=>{document.querySelectorAll('.dev[data-d]').forEach(x=>x.classList.remove('on'));b.classList.add('on');pv.classList.toggle('phone',b.dataset.d==='phone');});

/* init */
buildForm();render();
